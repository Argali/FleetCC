name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cauto-frontend/package-lock.json

      - name: Install
        working-directory: cauto-frontend
        run: npm ci --legacy-peer-deps

      - name: Unit tests
        working-directory: cauto-frontend
        run: npm test

      - name: Install Playwright browsers
        working-directory: cauto-frontend
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        working-directory: cauto-frontend
        env:
          VITE_API_URL: http://localhost:3001/api
        run: npm run test:e2e --project=chromium

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: cauto-frontend/playwright-report/

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cauto-frontend/package-lock.json

      - name: Install
        working-directory: cauto-frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: cauto-frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          BASE_PATH: /FleetCC
        run: npm run build

      - name: Validate build
        working-directory: cauto-frontend
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html missing" && exit 1)
          test -f dist/404.html   || (echo "ERROR: dist/404.html missing"   && exit 1)
          ENTRY=$(find dist/assets -name 'index-*.js' | head -1)
          if [ -z "$ENTRY" ]; then echo "ERROR: no entry chunk found" && exit 1; fi
          SIZE=$(gzip -c "$ENTRY" | wc -c)
          echo "Entry chunk gzipped: ${SIZE} bytes"
          if [ "$SIZE" -gt 204800 ]; then
            echo "WARNING: entry chunk exceeds 200 kB gzipped (${SIZE} bytes)"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cauto-frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
