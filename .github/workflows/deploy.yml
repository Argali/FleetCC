name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cauto-frontend/package-lock.json

      - name: Install dependencies
        working-directory: cauto-frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: cauto-frontend
        env:
          # Set in repo Settings → Secrets and variables → Actions → Secrets
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # Set in repo Settings → Secrets and variables → Actions → Variables
          # Value should be /YOUR_REPO_NAME/  (e.g.  /fleetcc/)
          BASE_PATH: ${{ vars.BASE_PATH || '/' }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cauto-frontend/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v3
